<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Y MVP Runtime</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="side-panel">
        <div>
          <p class="eyebrow">Pet Y MVP</p>
          <h1 id="runtime-title">Runtime</h1>
        </div>

        <section class="panel-block">
          <h2>本地宠物</h2>
          <div class="pet-card">
            <div class="pet-preview" id="pet-preview"></div>
            <div>
              <strong id="pet-name">Momo</strong>
              <p id="pet-personality">加载中...</p>
            </div>
          </div>
          <button id="register-profile" class="primary-button">注册宠物名片</button>
        </section>

        <section class="panel-block">
          <h2>串门</h2>
          <label for="friend-select">好友</label>
          <select id="friend-select"></select>
          <button id="send-visit" class="primary-button">让宠物去串门</button>
          <p id="visit-status" class="muted">等待操作</p>
        </section>

        <section class="panel-block">
          <h2>来访控制</h2>
          <div class="button-row">
            <button id="feed-visitor">投喂</button>
            <button id="return-visitor">请回</button>
          </div>
        </section>
      </aside>

      <section class="desktop-stage" aria-label="desktop runtime">
        <div class="desktop-header">
          <div>
            <span class="status-dot"></span>
            <span id="connection-status">连接中</span>
          </div>
          <span id="desktop-owner">桌面</span>
        </div>
        <div id="desktop" class="desktop">
          <div class="grid-glow"></div>
        </div>
      </section>

      <aside class="log-panel">
        <section>
          <h2>生活日志</h2>
          <ol id="life-log" class="event-list"></ol>
        </section>
        <section>
          <h2>协议事件</h2>
          <ol id="protocol-log" class="event-list compact"></ol>
        </section>
      </aside>
    </main>

    <script type="module" src="/runtime.js"></script>
  </body>
</html>
